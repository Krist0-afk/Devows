server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: ms-usuario
            uri: lb://MS-USUARIO
            predicates:
              - Path=/api/usuarios/**, /api/auth/**
          - id: ms-mascota
            uri: lb://MS-MASCOTA
            predicates:
              - Path=/api/pets/**
          - id: ms-coincidencias
            uri: lb://MS-COINCIDENCIAS
            predicates:
              - Path=/api/coincidencias/**
          - id: ms-comunidad
            uri: lb://MS-COMUNIDAD
            predicates:
              - Path=/api/success-stories/**
          - id: ms-notificaciones
            uri: lb://MS-NOTIFICACIONES
            predicates:
              - Path=/api/notificaciones/**

# La URL de Eureka se inyecta via variable de entorno EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
# definida en el Task Definition de ECS (terraform/microservices.tf).
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}


logging:
  level:
    org.springframework.security: DEBUG